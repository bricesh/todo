<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tasks</title>

  <meta name="theme-color" content="#0d0d0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tasks">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext x='50%25' y='62%25' text-anchor='middle' font-size='28' fill='%23fbbf24'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Geist:wght@300..600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <!-- Firebase SDK + Auth + Realtime Database (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="app.js" defer></script>
</head>
<body>

  <!-- Lock screen — shown when not authenticated -->
  <div class="lock-screen" id="lockScreen" hidden>
    <div class="lock-card">
      <div class="lock-eyebrow" id="lockDate">—</div>
      <h1 class="lock-title">Tasks <em>locked</em></h1>
      <p class="lock-subtitle">Enter your access key to continue.</p>
      <form class="lock-form" id="lockForm" autocomplete="on">
        <!-- Hidden username field so password managers can autofill -->
        <input type="text" id="lockUsername" name="username" autocomplete="username" value="me@tasks.local" hidden readonly>
        <input class="lock-input" type="password" id="lockInput" name="password" autocomplete="current-password" placeholder="Access key" autofocus>
        <button class="lock-btn" type="submit" id="lockBtn">
          <span class="lock-btn-label">Unlock</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>
      <div class="lock-error" id="lockError" hidden></div>
    </div>
  </div>

  <!-- Main app — shown when authenticated -->
  <div class="app" id="app" hidden>
    <header class="header">
      <div class="header-eyebrow" id="todayDate">—</div>
      <div class="header-row">
        <h1 class="header-title">Tasks <em>pending</em></h1>
        <div class="header-actions">
          <div class="header-count" id="taskCount">0</div>
          <button class="header-lock" id="signOutBtn" aria-label="Lock">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="task-list" id="taskBody"></main>

    <div class="empty-state" id="emptyState" hidden>
      <div class="empty-mark">✦</div>
      <p>All clear. Nothing pending.</p>
    </div>

    <datalist id="listProjects"></datalist>
  </div>

  <!-- Edit sheet — bottom-sheet modal shown on mobile when tapping edit -->
  <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Edit task" hidden>
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">Edit <em>task</em></h2>
    <form class="sheet-form" id="sheetForm">
      <label class="sheet-field">
        <span class="sheet-label">Subject</span>
        <input class="sheet-input" type="text" id="sheetSubject" autocomplete="off" enterkeyhint="done">
      </label>
      <label class="sheet-field">
        <span class="sheet-label">Project</span>
        <input class="sheet-input" type="text" list="listProjects" id="sheetProject" autocomplete="off" placeholder="—" enterkeyhint="done">
      </label>
      <label class="sheet-field">
        <span class="sheet-label">Due date</span>
        <input class="sheet-input sheet-input--date" type="date" id="sheetDate">
      </label>
      <button class="sheet-btn" type="submit" id="sheetSave">Done</button>
    </form>
  </div>

  <!-- Undo toast — shown briefly after marking a task done -->
  <div class="toast" id="toast" role="status" aria-live="polite" hidden>
    <div class="toast-body">
      <div class="toast-text">
        <span class="toast-label">Marked done</span>
        <span class="toast-subject" id="toastSubject"></span>
      </div>
      <button class="toast-undo" id="toastUndo" type="button">Undo</button>
    </div>
    <div class="toast-progress" id="toastProgress"></div>
  </div>

</body>
</html>
