<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tasks</title>

  <!-- PWA / mobile niceties: installable to home screen, themed status bar -->
  <meta name="theme-color" content="#0d0d0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tasks">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext x='50%25' y='62%25' text-anchor='middle' font-size='28' fill='%23fbbf24'%3E%E2%9C%A6%3C/text%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Geist:wght@300..600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <!-- Firebase Web SDK (compat — same surface as the extension) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-eyebrow" id="todayDate">—</div>
      <div class="header-row">
        <h1 class="header-title">Tasks <em>pending</em></h1>
        <div class="header-count" id="taskCount">0</div>
      </div>
    </header>

    <main class="task-list" id="taskBody"></main>

    <div class="empty-state" id="emptyState" hidden>
      <div class="empty-mark">✦</div>
      <p>All clear. Nothing pending.</p>
    </div>

    <datalist id="listProjects"></datalist>
  </div>
</body>
</html>
